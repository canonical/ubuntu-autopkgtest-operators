<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Autopkgtest Results {{title_suffix}}</title>
    <link rel="stylesheet"
          type="text/css"
          href="{{static_url}}bootstrap/css/bootstrap.css" />
    <link rel="stylesheet"
          type="text/css"
          href="{{static_url}}fork-awesome/css/fork-awesome.css" />
    <link rel="stylesheet" type="text/css" href="{{static_url}}style.css" />
  </head>
  <body>
    <div id="wrap">

      <!-- Fixed navbar -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
          <a class="navbar-brand" href="{{base_url}}">
            <svg style="display: inline-block;
                        width: 30px;
                        height: 30px;
                        margin-right: 0.5rem"
                 xmlns="http://www.w3.org/2000/svg"
                 version="1.1"
                 viewBox="0 0 512 512">
              <defs>
              <style>
                  .st0 { fill: #e95420; }
                  .st1 { fill: #fff; }
                  .st2 { fill: none; }
              </style>
              </defs>
              <g>
              <rect class="st0" width="512" height="512" />
              <g>
              <circle class="st1" cx="116.5" cy="245.8" r="52.7" />
              <circle class="st1" cx="336.1" cy="130.2" r="52.7" />
              <path class="st1" d="M235.4,381.5c-38-8.1-69.7-32.4-87.6-66.8-14.1,6.4-29.9,8.3-45.1,5.5,21.6,53,67.4,91.5,123.6,103.6,12.3,2.6,24.9,3.9,37.4,3.9-9.7-12.7-15.1-28.1-15.4-44.1-4.3-.5-8.7-1.2-12.9-2.1,0,0,0,0,0,0Z" />
              <circle class="st1" cx="324.2" cy="381.8" r="52.7" />
              <path class="st1" d="M397.6,362.4c16.4-20.7,27.9-45.1,33.5-71.1,9.7-45.3.6-92.8-24.9-131.3-6.1,14.3-16.4,26.4-29.7,34.7,14.2,26.8,18.6,57.8,12.2,87.5-3.1,14.6-8.6,28.3-16.4,40.9,12.4,10.2,21.2,23.9,25.2,39.3h0Z" />
              <path class="st1" d="M112.4,170.2c1.3,0,2.7-.1,4-.1,5.3,0,10.6.6,15.9,1.7,8.6,1.8,16.7,5.1,24.1,9.7,23.7-34.1,62-54.6,103.6-55.4.2-4,.8-8,1.6-11.9,2.4-11.3,7.4-21.9,14.4-30.9-66.3-5.3-130.7,29-163.6,86.9h0Z" />
              </g>
              </g>
              <rect class="st2" x="29.4" y="22.3" width="188" height="188" />
            </svg>
            Ubuntu Autopkgtest
          </a>
          <button type="button"
                  class="navbar-toggler"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbar-collapse">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbar-collapse">
            <ul class="nav navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}running">Running</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}recent">Recent</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}statistics">Statistics</a>
              </li>
              <li class="nav-item">
                <a class="nav-link"
                   href="https://wiki.ubuntu.com/ProposedMigration#autopkgtests">Documentation</a>
              </li>
            </ul>
            <ul class="nav navbar-nav ms-auto">
              {% if not session.get("nickname") %}
                <li class="nav-item">
                  <a class="nav-link" href="{{base_url}}request.cgi?/login">Login</a>
                </li>
              {% else %}
                <li class="nav-item">
                  <a class="nav-link"
                     href="{{ base_url }}user/{{ session.get("nickname") }}">{{ session.get("nickname") }}</a>
                </li>
              {% endif %}
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <div class="container mt-4">
      {% block content %}
      {% endblock content %}
    </div>

    <script type="text/javascript" src="{{static_url}}jquery/jquery.min.js"></script>
    <script type="text/javascript"
            src="{{static_url}}bootstrap/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
