<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Autopkgtest Results {{title_suffix}}</title>
    <link rel="stylesheet"
          type="text/css"
          href="{{static_url}}bootstrap/css/bootstrap.css" />
    <link rel="stylesheet" type="text/css" href="{{static_url}}style.css" />
  </head>
  <body>
    <div id="wrap">

      <!-- Fixed navbar -->
      <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
          <a class="navbar-brand" href="{{base_url}}">Ubuntu Autopkgtest</a>
          <button type="button"
                  class="navbar-toggler"
                  data-bs-toggle="collapse"
                  data-bs-target="#navbar-collapse">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbar-collapse">
            <ul class="nav navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}running">Running</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}recent">Recent</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{{base_url}}statistics">Statistics</a>
              </li>
              <li class="nav-item">
                <a class="nav-link"
                   href="https://wiki.ubuntu.com/ProposedMigration#autopkgtests">Documentation</a>
              </li>
            </ul>
            <ul class="nav navbar-nav ms-auto">
              {% if not session.get("nickname") %}
                <li class="nav-item">
                  <a class="nav-link" href="{{base_url}}request.cgi?/login">Login</a>
                </li>
              {% else %}
                <li class="nav-item">
                  <a class="nav-link"
                     href="{{ base_url }}user/{{ session.get("nickname") }}">{{ session.get("nickname") }}</a>
                </li>
              {% endif %}
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <div class="container mt-4">
      {% block content %}
      {% endblock content %}
    </div>

    <script type="text/javascript" src="{{static_url}}jquery/jquery.min.js"></script>
    <script type="text/javascript"
            src="{{static_url}}bootstrap/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
